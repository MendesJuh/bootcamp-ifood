<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <table border="1">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Nota 1</th>
                <th>Nota 2</th>
                <th>Nota 3</th>
                <th>Nota 4</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>Gean</td>
                <td>90</td>
                <td>85</td>
                <td>88</td>
                <td>70</td>
            </tr>
            <tr>
                <td>Simon</td>
                <td>78</td>
                <td>92</td>
                <td>85</td>
                <td>70</td>
            </tr>
            <tr>
                <td>Bruno</td>
                <td>88</td>
                <td>76</td>
                <td>90</td>
                <td>60</td>
            </tr>
            <tr>
                <td>Juliana</td>
                <td>95</td>

                <td>94</td>
                <td>70</td>
            </tr>
        </tbody>
    </table>
    <hr>

    <table border="1">
        <thead>
            <tr>
                <th colspan="4">Informações</th>
            </tr>
            <tr>

                <th colspan="2">Genero</th>
                <th>Idade</th>
                <th>Peso</th>

            </tr>
        </thead>

        <tr>
            <td rowspan="2" colspan="2">Homens</td>
            <td>70</td>
            <td>80Kg</td>
        </tr>

        <tr>
            <td>37</td>
            <td>70Kg</td>
        </tr>
        <tr>
            <td rowspan="2" colspan="2">Mulheres</td>

            <td>55Kg</td>
        </tr>
        <tr>
            <td>33</td>
            <td>90Kg</td>
        </tr>

    </table>
    <hr>

    <style>
        .tabela{
            border-collapse: collapse;
            width: 100%;
            height: 150px;
            text-align: center;
        }
        .fundo  {
            background-color: lightgray;
        }
    </style>

    <table class="tabela" border="1">
        <thead  class="fundo">
            <tr>
                <th colspan="4">Informações</th>
            </tr>
            <tr>

                <th colspan="2">Genero</th>
                <th>Idade</th>
                <th>Peso</th>

            </tr>
        </thead>

        <tr>
            <td rowspan="2" colspan="2" class="fundo">Homens</td>
            <td>70</td>
            <td>80Kg</td>
        </tr>

        <tr>
            <td>19</td>
            <td>70Kg</td>
        </tr>
        <tr>
            <td rowspan="2" colspan="2" class="fundo">Mulheres</td>
            <td>37</td>
            <td>90Kg</td>
        </tr>
        <tr>
            <td>25</td>
            <td>78Kg</td>
        </tr>

    </table>

</body>

</html>
