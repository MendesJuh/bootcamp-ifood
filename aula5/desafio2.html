<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Colorful boxes</title>
</head>
<body>
    <section>
        <table>
          <thead>
            <tr>
              <th colspan="4">
                1
              </th>
            </tr>
            <tr>
              <th>2</th>
              <th>3</th>
              <th colspan="2">4</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <th rowspan="2">5</th>
              <td>6</td>
              <td colspan="2">7</td>
            </tr>
            <tr>
              <th>8</th>
              <td>9</td>
              <td>10</td>
            </tr>
          </tbody>
        </table>
      </section>
      <style>
        table {
    border-collapse: collapse;
    width: 50%;
    margin: 0 auto;
  }
  
  tr, th, td {
    border: 1px solid #000;
    padding: 8px;
    text-align: center;
    font-weight: bold;
  }
  th[colspan="4"] {
  background-color: violet;
}
th[colspan="2"]{
  background-color: orangered;
}
td[colspan="2"]{
    background-color: orangered;
}
th[rowspan="2"]{
    background-color: greenyellow;
}
td + td {                   
    background-color: blue;
  }
  th {                      
    background-color: red;
  }

  tbody > tr {          
    background-color: gray;
  }
      </style>
    
</body>
</html>
